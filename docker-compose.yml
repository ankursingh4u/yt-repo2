services:
  short-video-maker:
    # Prebuilt public image. Variants: latest-tiny (~3GB RAM), latest, latest-cuda.
    image: gyoridavid/short-video-maker:latest-tiny
    restart: unless-stopped
    environment:
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - LOG_LEVEL=info
      - PORT=3123
      - KOKORO_MODEL_PRECISION=q8
      - CONCURRENCY=1
    expose:
      - "3123"
    labels:
      # Tell Traefik which network to reach this container on.
      - "traefik.docker.network=coolify"
    networks:
      - default
      - coolify
    volumes:
      - svm-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3123/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

networks:
  coolify:
    external: true

volumes:
  svm-data:
