services:
  short-video-maker:
    # Prebuilt public image. Variants: latest-tiny (~3GB RAM), latest, latest-cuda.
    image: gyoridavid/short-video-maker:latest-tiny
    restart: unless-stopped
    environment:
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - LOG_LEVEL=info
      # Listen on 80 so Coolify's default Traefik routing maps cleanly.
      - PORT=80
      - KOKORO_MODEL_PRECISION=q8
      - CONCURRENCY=1
    expose:
      - "80"
    volumes:
      - svm-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

volumes:
  svm-data:
